<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePilot (Free Courses)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        :root {
            --bg-primary: #ffffff;
            --bg-tertiary: #f5f5f7;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #eeeeee;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.04);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.08);
            --accent: #5352ed;
            --accent-light: #7a7aff;
            --accent-glow: rgba(83, 82, 237, 0.15);
        }

        body { background: var(--bg-primary); min-height: 100vh; }
        .main-content { padding: 25px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }

        .search-area { width: 100%; max-width: 500px; margin: 0 auto 30px; position: sticky; top: 15px; z-index: 100; }
        .search-wrap { position: relative; }
        .search-box { width: 100%; padding: 12px 20px 12px 50px; border-radius: 40px; border: 1px solid #e2e8f0; outline: none; font-size: 14px; font-family: 'Poppins', sans-serif; box-shadow: var(--shadow-soft); transition: all 0.25s ease; background: var(--bg-primary); }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow), var(--shadow-hover); transform: translateY(-2px); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 16px; pointer-events: none; }

        .section { margin-bottom: 30px; }
        .section-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 15px; padding-left: 4px; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 220px)); gap: 18px; }

        .card { background: var(--bg-primary); width: 100%; height: 300px; border-radius: 14px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: visible; box-shadow: var(--shadow-soft); cursor: pointer; border: 1px solid var(--border-color); position: relative; text-decoration: none; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); opacity: 0; transition: opacity 0.3s ease; border-radius: 14px 14px 0 0; }
        .card:hover { transform: translateY(-6px) scale(1.015); box-shadow: var(--shadow-hover); border-color: var(--accent); z-index: 5; }
        .card:hover::before { opacity: 1; }

        .img-box { height: 160px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: visible; border-radius: 14px 14px 0 0; flex-shrink: 0; }
        .img-box::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s ease; border-radius: 14px 14px 0 0; }
        .card:hover .img-box::after { opacity: 1; }
        .img-box img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; transition: transform 0.3s ease; position: relative; z-index: 1; }
        .card:hover img { transform: scale(1.08); }

        .text-box { padding: 15px 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .text-box h3 { font-size: 13px; font-weight: 700; color: var(--text-primary); transition: color 0.25s ease; line-height: 1.3; }
        .card:hover .text-box h3 { color: var(--accent); }

        .card-btn { background: linear-gradient(45deg, var(--accent), var(--accent-light)); color: white; text-align: center; padding: 12px 0; font-size: 12px; font-weight: 600; transition: all 0.25s ease; position: relative; overflow: hidden; border-radius: 0 0 14px 14px; margin: 0 10px 10px 10px; width: calc(100% - 20px); flex-shrink: 0; }
        .card-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.4s ease; }
        .card:hover .card-btn::before { left: 100%; }
        .card:hover .card-btn { box-shadow: 0 6px 20px rgba(83,82,237,0.3); }

        @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>

    // Search across all categories including typing
    const allTools = [...cards.earn, ...cards.edit, ...cards.typing, ...cards.hardware,
 ...cards.windows,                     ...cards.office];

    function makeCard(t) {
        return `<a class="card" href="${t.link}" target="_blank" rel="noopener">
            <div class="img-box"><img src="${t.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/128/2965/2965278.png'" alt="${t.name}"></div>
            <div class="text-box"><h3>${t.name}</h3></div>
            <div class="card-btn">Open Link ↗</div>
        </a>`;
    }

    function renderAll() {
        document.getElementById('earnGrid').innerHTML   = cards.earn.map(makeCard).join('');
        document.getElementById('editGrid').innerHTML   = cards.edit.map(makeCard).join('');
        document.getElementById('typingGrid').innerHTML = cards.typing.map(makeCard).join(''); // ✅ NEW
document.getElementById('hardwareGrid').innerHTML = cards.hardware.map(makeCard).join('');
 document.getElementById('windowsGrid').innerHTML = cards.windows.map(makeCard).join('');    document.getElementById('officeGrid').innerHTML = cards.office.map(makeCard).join('');
    }

    function handleEnter(e) {
        if (e.key !== 'Enter') return;
        const q = document.getElementById('searchInp').value.trim().toLowerCase();
        if (!q) return;
        const match = allTools.find(t => t.name.toLowerCase().includes(q));
        if (match) window.open(match.link, '_blank');
    }

    function handleSearch(val) {
        const q = val.trim().toLowerCase();
        const ss = document.getElementById('searchSection');
        const mc = document.getElementById('mainContent');
        if (!q) { ss.style.display = 'none'; mc.style.display = 'block'; return; }
        const res = allTools.filter(t => t.name.toLowerCase().includes(q));
        ss.style.display = 'block';
        mc.style.display = 'none';
        document.getElementById('searchGrid').innerHTML = res.length
            ? res.map(makeCard).join('')
            : `<p style="color:#666;font-size:13px;grid-column:1/-1;padding:10px 0;">Koi tool nahi mila "<b>${val}</b>" ke liye.</p>`;
    }

    renderAll();
